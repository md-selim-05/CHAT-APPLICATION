<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Room Options</title>
  <link rel="stylesheet" href="./css/room.css">
</head>
<body>

  <div class="card">
    
    <div class="toggle-wrapper">
      <div class="toggle-bg" id="slider"></div>
      <button class="toggle-btn active" id="btn-create" onclick="switchTab('create')">
        Create Room
      </button>
      <button class="toggle-btn" id="btn-join" onclick="switchTab('join')">
        Join Room
      </button>
    </div>

    <div class="form-container" id="form-create">
      <h2>Start a new chat</h2>
      <input type="text" id="create-username" placeholder="Enter your username" autocomplete="off" />
      <input type="number" id="create-capacity" placeholder="Room Capacity (e.g. 5)" min="2" max="50" autocomplete="off" oninput="this.value = this.value.replace(/[^0-9]/g, '')" />
      <button class="action-btn" onclick="createRoom()">Create</button>
    </div>

    <div class="form-container hidden" id="form-join">
      <h2>Join existing chat</h2>
      <input type="text" id="join-username" placeholder="Enter your username" autocomplete="off" />
      <input type="text" id="join-roomKey" placeholder="Enter 6-digit Room ID" autocomplete="off" />
      <button class="action-btn" onclick="joinRoom()">Join</button>
    </div>

  </div>

  <script>
    function switchTab(tab) {
      const createForm = document.getElementById('form-create');
      const joinForm = document.getElementById('form-join');
      const btnCreate = document.getElementById('btn-create');
      const btnJoin = document.getElementById('btn-join');
      const slider = document.getElementById('slider');

      if (tab === 'create') {
        createForm.classList.remove('hidden');
        joinForm.classList.add('hidden');
        btnCreate.classList.add('active');
        btnJoin.classList.remove('active');
        slider.classList.remove('slide-right');
      } else {
        createForm.classList.add('hidden');
        joinForm.classList.remove('hidden');
        btnCreate.classList.remove('active');
        btnJoin.classList.add('active');
        slider.classList.add('slide-right');
      }
    }

    function createRoom() {
      const name = document.getElementById("create-username").value.trim();
      const capacity = document.getElementById("create-capacity").value.trim() || 10;
      if (!name) return alert("Please enter your username.");
      
      sessionStorage.setItem('chatParams', JSON.stringify({ action: 'create', name, capacity }));
      window.location.href = `/chat`;
    }

    function joinRoom() {
      const name = document.getElementById("join-username").value.trim();
      const room = document.getElementById("join-roomKey").value.trim();
      if (!name || !room) return alert("Please fill in both fields.");
      
      sessionStorage.setItem('chatParams', JSON.stringify({ action: 'join', name, room }));
      window.location.href = `/chat`;
    }
  </script>

</body>
</html>
