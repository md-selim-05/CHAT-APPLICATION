<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat Room</title>
  <link rel="stylesheet" href="css/chat.css" />
</head>
<body>
  <div class="chat-container">
    <div id="room-header">
      <div class="header-info">
        <span>Room ID: <strong id="display-room-id">...</strong></span>
        <button id="copy-btn" title="Copy Room ID">📋</button>
        <span class="participants">👥 <span id="participant-count">0</span></span>
      </div>
      <div class="header-actions">
        <button id="theme-btn" title="Toggle Light/Dark Mode">☀️</button>
        <button id="exit-btn">Exit</button>
      </div>
    </div>
    
    <ul id="messages"></ul>

    <div id="reply-preview">
      <div class="reply-content">
        Replying to <strong id="reply-user"></strong>: <span id="reply-text"></span>
      </div>
      <button id="cancel-reply" title="Cancel Reply">✖</button>
    </div>

    <form id="form">
      <input id="input" autocomplete="off" placeholder="Type a message..." />
      <button type="submit">Send</button>
    </form>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let replyingTo = null; 

    const chatParamsStr = sessionStorage.getItem('chatParams');
    if (!chatParamsStr) {
      window.location.href = "/room"; 
    }
    
    const params = JSON.parse(chatParamsStr);
    window.history.replaceState({}, '', `/chat`);

    if (params.action === 'create') {
      socket.emit("create room", { username: params.name, capacity: params.capacity });
    } else if (params.action === 'join') {
      socket.emit("join room", { username: params.name, roomId: params.room });
    }

    socket.on("room created", (roomId) => document.getElementById("display-room-id").textContent = roomId);
    socket.on("room joined", (roomId) => document.getElementById("display-room-id").textContent = roomId);
    socket.on("room update", (count) => document.getElementById("participant-count").textContent = count);
    socket.on("invalid room", (msg) => { alert(msg); window.location.href = "/room"; });

    document.getElementById("copy-btn").addEventListener("click", () => {
      const roomId = document.getElementById("display-room-id").textContent;
      if(roomId !== "...") {
        navigator.clipboard.writeText(roomId).then(() => {
          const btn = document.getElementById("copy-btn");
          btn.textContent = "✅";
          setTimeout(() => btn.textContent = "📋", 2000);
        });
      }
    });

    const themeBtn = document.getElementById("theme-btn");
    themeBtn.addEventListener("click", () => {
      const currentTheme = document.documentElement.getAttribute("data-theme");
      const targetTheme = currentTheme === "light" ? "dark" : "light";
      document.documentElement.setAttribute("data-theme", targetTheme);
      themeBtn.textContent = targetTheme === "light" ? "🌙" : "☀️";
    });

    document.getElementById("exit-btn").addEventListener("click", () => {
      sessionStorage.removeItem('chatParams');
      window.location.href = "/room"; 
    });

    document.getElementById("cancel-reply").addEventListener("click", () => {
      replyingTo = null;
      document.getElementById("reply-preview").style.display = "none";
    });

    const messages = document.getElementById("messages");
    const form = document.getElementById("form");
    const input = document.getElementById("input");

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      if (input.value.trim() !== "") {
        socket.emit("chat message", { text: input.value, replyTo: replyingTo });
        
        input.value = "";
        replyingTo = null;
        document.getElementById("reply-preview").style.display = "none";
        input.focus();
      }
    });

    socket.on("chat message", function (data) {
      const li = document.createElement("li");

      if (data.system) {
        li.classList.add("system");
        li.innerHTML = `<div class="system-msg">${data.text}</div>`;
      } else {
        const isOwnMessage = data.user === params.name;
        li.classList.add(isOwnMessage ? "own-message" : "other-message");

        let quoteHtml = "";
        if (data.replyTo) {
          const quoteUser = data.replyTo.user === params.name ? "You" : data.replyTo.user;
          quoteHtml = `
            <div class="quoted-msg">
              <span class="quote-user">${quoteUser}</span>
              <span class="quote-text">${data.replyTo.text}</span>
            </div>
          `;
        }

        const displayName = isOwnMessage ? "You" : data.user;
        const nameColor = isOwnMessage ? "inherit" : data.color;

        // Create a wrapper to hold both the bubble and the reply button side-by-side
        const msgWrapper = document.createElement("div");
        msgWrapper.classList.add("msg-wrapper");
        
        // The bubble only contains the text and background color now
        const msgBubble = document.createElement("div");
        msgBubble.classList.add("msg-bubble");
        msgBubble.innerHTML = `
          ${quoteHtml}
          <div class="msg-text-content">
            <span class="username" style="color:${nameColor}">${displayName}:</span>
            <span class="message-text">${data.text}</span>
          </div>
        `;

        const replyBtn = document.createElement("button");
        replyBtn.classList.add("reply-btn");
        replyBtn.innerHTML = "↩️";
        replyBtn.title = "Reply";
        replyBtn.onclick = () => {
          replyingTo = { user: data.user, text: data.text };
          document.getElementById("reply-user").textContent = displayName;
          document.getElementById("reply-text").textContent = data.text;
          document.getElementById("reply-preview").style.display = "flex";
          input.focus();
        };

        // Append both to the wrapper. CSS flex-direction handles placing the button on the correct side
        msgWrapper.appendChild(msgBubble);
        msgWrapper.appendChild(replyBtn);

        li.appendChild(msgWrapper);
      }

      messages.appendChild(li);
      messages.scrollTop = messages.scrollHeight;
      input.focus();
    });
  </script>
</body>
</html>
