<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat Room</title>
  <link rel="stylesheet" href="css/chat.css" />
</head>
<body>
  <div class="chat-container">
    <div id="room-header">
      <span>Room ID: <span id="display-room-id">...</span></span>
      <button id="exit-btn">Exit Room</button>
    </div>
    
    <ul id="messages"></ul>

    <form id="form">
      <input id="input" autocomplete="off" placeholder="Type a message..." />
      <button type="submit">Send</button>
    </form>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();

    const params = new URLSearchParams(window.location.search);
    const username = params.get("name") || "Guest";
    const create = params.get("create");
    const room = params.get("room");

    if (create) {
      socket.emit("create room", username);
    } else if (room) {
      socket.emit("join room", { username, roomId: room });
    }

    socket.on("room created", (roomId) => {
      window.history.replaceState({}, '', `/chat?room=${roomId}&name=${username}`);
      document.getElementById("display-room-id").textContent = roomId;
    });

    socket.on("room joined", (roomId) => {
      document.getElementById("display-room-id").textContent = roomId;
    });

    socket.on("invalid room", () => {
      alert("Invalid Room ID or the room has been deleted due to inactivity.");
      window.location.href = "/room"; 
    });

    // Handle Exit Button Click
    document.getElementById("exit-btn").addEventListener("click", () => {
      window.location.href = "/room"; // Redirects back to the room selection menu
    });

    const messages = document.getElementById("messages");
    const form = document.getElementById("form");
    const input = document.getElementById("input");

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      if (input.value.trim() !== "") {
        socket.emit("chat message", { text: input.value });
        input.value = "";
        input.focus();
      }
    });

    socket.on("chat message", function (data) {
      const li = document.createElement("li");

      if (data.system) {
        li.classList.add("system");
        li.textContent = data.text;
      } else {
        li.innerHTML = `
          <span class="username" style="color:${data.color}">
            ${data.user}:
          </span>
          <span class="message-text">${data.text}</span>
        `;
      }

      messages.appendChild(li);
      messages.scrollTop = messages.scrollHeight;
      input.focus();
    });
  </script>
</body>
</html>
